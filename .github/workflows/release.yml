name: Release

# Trigger by pushing a semver tag, e.g. `git tag v1.0.0 && git push --tags`
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # required to create a GitHub Release

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v5.0.0
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches in-code version
        run: |
          CODE_VER=$(node -e "const p=require('./package.json'); console.log(p.version);")
          TAG_VER="${{ steps.version.outputs.value }}"
          if [ "$CODE_VER" != "$TAG_VER" ]; then
            echo "::error::Tag version ($TAG_VER) does not match package.json version ($CODE_VER). Bump the version with \`npm run release -- --bump patch|minor|major\` before tagging."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Package release zip
        run: npm run release -- --skip-build

      - name: Extract changelog entry
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          # Pull the block between "= $VERSION =" and the next "= " heading
          NOTES=$(awk "/^= $VERSION =/{found=1; next} found && /^= [0-9]/{exit} found{print}" readme.txt \
            | sed '/^[[:space:]]*$/d' \
            | sed 's/^\* /- /')
          if [ -z "$NOTES" ]; then
            NOTES="See readme.txt for full changelog."
          fi
          # Write to a temp file to avoid quoting issues with multiline strings
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete any existing release for this tag so CI is always authoritative.
          # (Ignore errors if no release exists yet.)
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "Aldus ${{ steps.version.outputs.value }}" \
            --notes-file /tmp/release-notes.md \
            releases/aldus-${{ steps.version.outputs.value }}.zip
